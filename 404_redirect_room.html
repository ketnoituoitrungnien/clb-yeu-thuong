<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    (function () {
      var path = location.pathname.replace(/^\/+|\/+$/g, "");
      if (path) {
        location.replace("/?room=" + encodeURIComponent(path) + "&role=female");
      } else {
        location.replace("/");
      }
    })();
  </script>
</head>
<body></body>
</html>
