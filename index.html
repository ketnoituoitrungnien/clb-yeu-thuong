<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Kết Nối Yêu Thương</title>

<meta property="og:title" content="Kết Nối Yêu Thương">
<meta property="og:description" content="Phòng trò chuyện riêng tư - an toàn - bảo mật">
<meta property="og:image" content="https://tuoitrungnien.com/preview.png">

<style>
body {font-family: Arial; background:#f8f0f2; margin:0;}
.container {display:flex; padding:20px;}
.left {width:280px;}
.box {background:white; border-radius:12px; padding:15px; margin-bottom:15px; border:1px solid #f3b5c3;}
.main {flex:1; margin-left:20px; background:white; border-radius:12px; padding:20px;}
.chat {margin-top:20px; border:1px solid #ddd; border-radius:10px; padding:10px; height:300px; overflow:auto;}
input, button {padding:8px; border-radius:6px; border:1px solid #ccc;}
button {background:#ff4d79; color:white; border:none;}
</style>
</head>

<body>

<h2 style="padding:15px;">❤️ Kết Nối Yêu Thương</h2>

<div class="container">

<div class="left">

<div class="box">
<b>Giới thiệu CLB</b><br>
Kết nối chân thành - uy tín - bảo mật
</div>

<div class="box">
<b>Cam kết</b>
<ul>
<li>Chân thành</li>
<li>Bảo mật</li>
<li>Không spam</li>
</ul>
</div>

<div class="box">
<b>Hồ sơ người dùng</b><br><br>
<input placeholder="Tên hiển thị">
</div>

<!-- ADMIN -->
<div id="adminBox" class="box" style="display:none;">
<b>Tạo phòng (Admin)</b><br><br>

<input id="roomInput" placeholder="Nhập mã phòng (vd: 6789)" style="width:100%"><br><br>

<button onclick="createRoom()">Xuất 3 link</button>

<div id="linkResult" style="margin-top:10px;"></div>
</div>

</div>

<div class="main">

<h3>Không gian trò chuyện riêng tư</h3>
<p id="status">Vui lòng sử dụng link mời</p>

<div id="chatBox" class="chat"></div>

<input id="msg" placeholder="Nhập tin nhắn..." style="width:80%">
<button onclick="send()">Gửi</button>

</div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// 🔥 DÁN CONFIG CỦA BẠN Ở ĐÂY
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB",
  projectId: "YOUR_ID",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// PARAM
function getParam(name){
  return new URLSearchParams(location.search).get(name);
}

// ADMIN
if(getParam("admin")=="1"){
  document.getElementById("adminBox").style.display="block";
}

// ROOM
let room = getParam("room");
let role = getParam("role");

if(room){
  document.getElementById("status").innerText = "Phòng " + room;
  var chatRef = ref(db, "rooms/"+room);

  onChildAdded(chatRef, (data)=>{
    let box = document.getElementById("chatBox");
    box.innerHTML += "<div>"+data.val().msg+"</div>";
  });

  window.send = function(){
    let msg = document.getElementById("msg").value;
    if(!msg) return;
    push(chatRef, {msg: msg});
    document.getElementById("msg").value="";
  }
}

// CREATE ROOM
window.createRoom = function(){
  let code = document.getElementById("roomInput").value.trim();
  if(!code) return alert("Nhập mã phòng");

  let base = location.origin;

  let male = base + "/?room=" + code + "&role=male";
  let female = base + "/?room=" + code + "&role=female";
  let cskh = base + "/?room=" + code + "&role=cskh";

  document.getElementById("linkResult").innerHTML = `
  Nam:<br>${male}<br><br>
  Nữ:<br>${female}<br><br>
  CSKH:<br>${cskh}<br><br>
  <button onclick="navigator.clipboard.writeText('${female}')">Copy link nữ</button>
  `;
}
</script>

</body>
</html>
