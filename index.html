<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kết Nối Yêu Thương</title>

<!-- PREVIEW -->
<meta property="og:title" content="Kết Nối Yêu Thương">
<meta property="og:description" content="Phòng trò chuyện riêng tư - an toàn - bảo mật">
<meta property="og:image" content="https://tuoitrungnien.com/preview.png">
<meta property="og:url" content="https://tuoitrungnien.com/">

<style>
body{font-family:Arial;background:#fff7fa;margin:0}
.wrap{max-width:900px;margin:auto;padding:20px}
.box{background:#fff;border:1px solid #f2ccd8;border-radius:20px;padding:20px}
input{padding:10px;width:100%;border-radius:10px;border:1px solid #ddd}
button{padding:10px 15px;border:none;border-radius:20px;background:#e6528a;color:#fff;font-weight:bold}
</style>
</head>

<body>
<div class="wrap">

<div class="box">
<h2>Tạo phòng (Admin)</h2>

<input id="roomCode" placeholder="Nhập số phòng ví dụ 6789">
<br><br>
<button onclick="taoPhong()">Xuất link</button>

<div id="result" style="margin-top:15px;"></div>
</div>

</div>

<script>
function taoPhong(){
  let raw = document.getElementById("roomCode").value;
  let num = raw.replace(/\\D/g,'');
  if(!num){ alert("Nhập số phòng"); return;}

  let room = "p"+num;
  let link = location.origin + "/" + room;

  document.getElementById("result").innerHTML = `
    <div>${link}</div>
    <button onclick="copyLink('${link}')">Copy</button>
  `;
}

function copyLink(link){
  navigator.clipboard.writeText(link);
  alert("Đã copy");
}

// vào phòng
const params = new URLSearchParams(location.search);
const r = params.get("r");

if(r){
  document.body.innerHTML = "<h2 style='text-align:center;margin-top:100px'>Đã vào phòng "+r+"</h2>";
}
</script>

</body>
</html>
