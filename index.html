<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kết Nối Yêu Thương</title>

<!-- PREVIEW -->
<meta property="og:title" content="Kết Nối Yêu Thương">
<meta property="og:image" content="https://tuoitrungnien.com/preview.png">
<meta property="og:type" content="website">
<meta property="og:url" content="https://tuoitrungnien.com/">

<style>
body{font-family:Arial;background:#fff8fa;margin:0}
.container{display:flex}
.left{width:300px;padding:15px}
.right{flex:1;padding:15px}
.box{background:#fff;border:1px solid #eee;border-radius:10px;padding:10px;margin-bottom:10px}
.chat{height:400px;overflow:auto;border:1px solid #eee;border-radius:10px;padding:10px;background:#fff}
.input{display:flex;margin-top:10px}
.input input{flex:1;padding:10px}
.input button{background:#c6285a;color:#fff;border:none;padding:10px}
.admin{display:none}
</style>
</head>

<body>

<div class="container">
<div class="left">

<div class="box">
<input id="name" placeholder="Tên">
</div>

<div class="box admin" id="adminBox">
<input id="room" placeholder="Mã phòng">
<button onclick="gen()">Xuất 3 link</button>

<div id="links"></div>
</div>

</div>

<div class="right">

<div id="chat" class="chat"></div>

<div class="input">
<input id="msg">
<button onclick="send()">Gửi</button>
</div>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyBzEsfKawGbZnRStNWK_qUjCMbZ7DJde80",
authDomain:"tinh-yeu-trung-nien.firebaseapp.com",
projectId:"tinh-yeu-trung-nien"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const url=new URLSearchParams(location.search);
const room=url.get("room");
const role=url.get("role");

if(url.get("admin")=="1"){
document.getElementById("adminBox").style.display="block";
}

function gen(){
let r=document.getElementById("room").value;
document.getElementById("links").innerHTML=`
Nam: ${location.origin}/?room=${r}&role=male<br>
Nữ: ${location.origin}/?room=${r}&role=female<br>
CSKH: ${location.origin}/?room=${r}&role=cskh
`;
}

if(room && role){

let col = role=="cskh" ? "support_"+room : "private_"+room;

db.collection(col).orderBy("time").onSnapshot(snap=>{
let html="";
snap.forEach(d=>{
let x=d.data();
html+=`<div><b>${x.name}</b>: ${x.text}</div>`;
});
document.getElementById("chat").innerHTML=html;
});

function send(){
let name=document.getElementById("name").value||"Khách";
let text=document.getElementById("msg").value;

let col = role=="cskh" ? "support_"+room : "private_"+room;

db.collection(col).add({
name,text,time:Date.now()
});

document.getElementById("msg").value="";
}

window.send=send;

}
</script>

</body>
</html>
