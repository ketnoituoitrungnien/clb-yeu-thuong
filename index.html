<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Kết Nối Yêu Thương</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="Kết Nối Yêu Thương">
<meta property="og:description" content="Phòng trò chuyện riêng tư - an toàn - bảo mật">
<meta property="og:image" content="https://tuoitrungnien.com/preview.png">

<style>
body{font-family:Arial;background:#f8f0f2;margin:0}
.wrap{display:flex;padding:15px}
.left{width:260px}
.box{background:#fff;border:1px solid #f3b5c3;border-radius:12px;padding:12px;margin-bottom:12px}
.main{flex:1;margin-left:15px;background:#fff;border-radius:12px;padding:15px}
.chat{height:300px;border:1px solid #ddd;border-radius:10px;overflow:auto;padding:10px}
input{padding:8px;border:1px solid #ccc;border-radius:6px;width:100%;margin-bottom:8px}
button{background:#ff4d79;color:#fff;border:none;padding:8px 10px;border-radius:6px}
.msg{margin:4px 0}
</style>
</head>

<body>

<h2 style="padding:10px">❤️ Kết Nối Yêu Thương</h2>

<div class="wrap">

<div class="left">

<div class="box">
<b>Giới thiệu CLB</b><br>
Kết nối chân thành - uy tín - bảo mật
</div>

<div class="box">
<b>Cam kết</b>
<ul>
<li>Chân thành</li>
<li>Bảo mật</li>
<li>Không spam</li>
</ul>
</div>

<div class="box">
<b>Hồ sơ người dùng</b>
<input id="name" placeholder="Tên hiển thị">
</div>

<!-- ADMIN -->
<div id="adminBox" class="box" style="display:none">
<b>Tạo phòng</b>
<input id="roomInput" placeholder="VD: 6789">
<button onclick="createRoom()">Xuất 3 link</button>
<div id="result"></div>
</div>

</div>

<div class="main">

<h3>Không gian trò chuyện riêng tư</h3>
<p id="status">Vui lòng dùng link mời</p>

<div id="chat" class="chat"></div>

<input id="msg" placeholder="Nhập tin nhắn">
<button onclick="sendMsg()">Gửi</button>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* ====== DÁN CONFIG CỦA BẠN ====== */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_PROJECT_ID"
};
/* ================================= */

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// param
function p(n){return new URLSearchParams(location.search).get(n)}

// bật admin
if(p("admin")=="1"){
  document.getElementById("adminBox").style.display="block";
}

// room
let room = p("room");
let chatRef;

if(room){
  document.getElementById("status").innerText="Phòng "+room;
  chatRef = ref(db,"rooms/"+room);

  onChildAdded(chatRef,(data)=>{
    let m=data.val();
    document.getElementById("chat").innerHTML +=
      `<div class="msg"><b>${m.name||"Khách"}:</b> ${m.text}</div>`;
  });
}

// gửi tin
window.sendMsg = function(){
  if(!chatRef) return;
  let text=document.getElementById("msg").value;
  if(!text) return;
  let name=document.getElementById("name").value || "Khách";

  push(chatRef,{name:name,text:text});
  document.getElementById("msg").value="";
}

// tạo phòng
window.createRoom = function(){
  let code=document.getElementById("roomInput").value.trim();
  if(!code) return alert("Nhập mã phòng");

  let base=location.origin;

  let male=base+`/?room=${code}&role=male`;
  let female=base+`/?room=${code}&role=female`;
  let cskh=base+`/?room=${code}&role=cskh`;

  document.getElementById("result").innerHTML=`
  Nam:<br>${male}<br><br>
  Nữ:<br>${female}<br><br>
  CSKH:<br>${cskh}<br><br>
  <button onclick="navigator.clipboard.writeText('${female}')">Copy link nữ</button>
  `;
}
</script>

</body>
</html>
