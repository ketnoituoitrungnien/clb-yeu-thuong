<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kết Nối Yêu Thương</title>

<meta property="og:title" content="Kết Nối Yêu Thương">
<meta property="og:description" content="Phòng riêng tư - bấm 1 lần là vào chat">
<meta property="og:image" content="https://tuoitrungnien.com/preview.png">

<style>
body{font-family:Arial;background:#fff8fa;margin:0}
.wrap{display:flex;gap:20px;padding:20px}
.left{width:320px}
.card{background:#fff;border:1px solid #f0d0da;border-radius:15px;padding:15px;margin-bottom:15px}
button{background:#c6285a;color:#fff;border:none;padding:10px 15px;border-radius:10px;cursor:pointer}
.chat{flex:1;background:#fff;border-radius:15px;border:1px solid #f0d0da;padding:15px}
#messages{height:300px;overflow:auto;border:1px solid #eee;margin-bottom:10px;padding:10px}
input{width:100%;padding:10px;border-radius:10px;border:1px solid #ccc}
</style>
</head>

<body>

<div class="wrap">

<div class="left">
<div class="card">
<h3>Tạo phòng</h3>
<input id="room" placeholder="Nhập mã phòng">
<button onclick="create()">Xuất 3 link</button>

<div id="links" style="margin-top:10px"></div>
</div>
</div>

<div class="chat">
<div id="messages"></div>
<input id="msg" placeholder="Nhập tin...">
<button onclick="send()">Gửi</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBzEsfKawGbZnRStNWK_qUjCMbZ7DJde80",
  authDomain: "tinh-yeu-trung-nien.firebaseapp.com",
  projectId: "tinh-yeu-trung-nien"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const url = new URLSearchParams(location.search);
const room = url.get("room");

if(room){
  const ref = db.collection("rooms").doc(room).collection("msg");

  ref.orderBy("time").onSnapshot(s=>{
    let html="";
    s.forEach(d=>{
      html += "<div>"+d.data().text+"</div>";
    });
    document.getElementById("messages").innerHTML = html;
  });

  window.send = function(){
    const text = document.getElementById("msg").value;
    if(!text) return;
    ref.add({text:text,time:Date.now()});
    document.getElementById("msg").value="";
  }
}else{
  document.querySelector(".chat").style.display="none";
}

function create(){
  const r = document.getElementById("room").value;
  const base = location.origin;
  document.getElementById("links").innerHTML = `
  Nam: ${base}/?room=${r}&role=male<br>
  Nữ: ${base}/?room=${r}&role=female<br>
  CSKH: ${base}/?room=${r}&role=cskh
  `;
}
</script>

</body>
</html>
