<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Kết Nối Yêu Thương</title>

<!-- Facebook preview -->
<meta property="og:title" content="Kết Nối Yêu Thương">
<meta property="og:description" content="Phòng trò chuyện riêng tư - an toàn - bảo mật">
<meta property="og:image" content="https://tuoitrungnien.com/banner-clb.png">
<meta property="og:url" content="https://tuoitrungnien.com">
<meta property="og:type" content="website">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#fff5f7;
  text-align:center;
}
.wrap{
  padding:30px;
}
.admin{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}
input{
  padding:10px;
  width:200px;
}
button{
  padding:10px 15px;
  background:#ff4d88;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.linkbox{
  margin-top:10px;
  background:#fff;
  padding:10px;
  border-radius:8px;
}
.chat{
  margin-top:30px;
  padding:20px;
  background:#fff;
  border-radius:10px;
}
</style>
</head>

<body>
<div class="wrap">

<!-- ADMIN -->
<div id="admin" class="admin" style="display:none;">
  <h3>Tạo phòng</h3>
  <input id="room" placeholder="Nhập mã phòng">
  <br><br>
  <button onclick="create()">Xuất 3 link</button>

  <div id="links"></div>
</div>

<!-- CHAT -->
<div id="chat" class="chat">
  <h2 id="title">Phòng</h2>
</div>

</div>

<script>
function getParam(name){
  return new URLSearchParams(location.search).get(name);
}

// ADMIN
if(getParam("admin")==="1"){
  document.getElementById("admin").style.display="block";
}

// tạo link
function create(){
  let r = document.getElementById("room").value;
  if(!r) return;

  let base = location.origin;

  let html = `
  <div class="linkbox">Nam: ${base}/?room=${r}&role=male</div>
  <div class="linkbox">Nữ: ${base}/?room=${r}&role=female</div>
  <div class="linkbox">CSKH: ${base}/?room=${r}&role=cskh</div>
  `;

  document.getElementById("links").innerHTML = html;
}

// CHAT LOAD
let room = getParam("room");
let role = getParam("role");

if(room){
  document.getElementById("title").innerText = "Phòng " + room;
}
</script>

</body>
</html>
