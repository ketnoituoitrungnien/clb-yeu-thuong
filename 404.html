<script>
(function(){
  var p = location.pathname.replace(/^\/+|\/+$/g,"");
  var m = p.match(/^(.+)-([mfc])$/i);
  if(!m){ location.replace("/"); return; }

  var map = {m:"male", f:"female", c:"cskh"};
  var room = decodeURIComponent(m[1]);
  var role = map[m[2].toLowerCase()] || "female";

  location.replace("/?room=" + encodeURIComponent(room) + "&role=" + role);
})();
</script>
